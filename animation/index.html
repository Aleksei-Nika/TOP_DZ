<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <nav>
            <a href="#clock">
                <div class="reference"></div>
            </a>
            <a href="#digital-clock">
                <div class="reference"></div>
            </a>
        </nav>
    </header>
    <div class="wrapper" id="clock">
        <div class="clock">
            <div class="clock-hand clock-second"></div>
            <div class="clock-hand clock-minute"></div>
            <div class="clock-hand clock-hour">
                <div class="clock-center"></div>
            </div>
        </div>
    </div>
    <div class="wrapper" id="digital-clock">
        <div class="digital-clock">
            <div class="numbers digital-hour">00</div>
            <div class="numbers digital-split">:</div>
            <div class="numbers digital-minute">00</div>
            <div class="numbers digital-split">:</div>
            <div class="numbers digital-second-e" data-seconds="00"></div>
        </div>
    </div>
</body>
</html>
