<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <nav>
            <a href="#clock">
                <div class="reference" id="reference-clock"></div>
            </a>
            <a href="#digital-clock">
                <div class="reference"></div>
            </a>
            <a href="#other">
                <div class="reference"></div>
            </a>
        </nav>
    </header>
    <div class="wrapper" id="clock">
        <div class="clock">
            <div class="clock-hand clock-second"></div>
            <div class="clock-hand clock-minute"></div>
            <div class="clock-hand clock-hour">
                <div class="clock-center"></div>
            </div>
        </div>
    </div>
    <div class="wrapper" id="digital-clock">
        <div class="digital-clock">
            <div class="numbers"><div class="digital-hour-d">000001111122</div></div>
            <div class="numbers"><div class="digital-hour-ed">012345678901234567890123</div></div>
            <div class="numbers digital-split">:</div>
            <div class="numbers"><div class="digital-minute-d">012345</div></div>
            <div class="numbers"><div class="digital-minute-ed">0123456789</div></div>
            <div class="numbers digital-split">:</div>
            <div class="numbers"><div class="digital-second-d">012345</div></div>
            <div class="numbers"><div class="digital-second-ed">0123456789</div></div>
        </div>
    </div>
    <div class="wrapper" id="other">
        <div id="obj1"></div>
        <div class="control">
            <div class="animation-start" id="start-jump"></div>
            <div class="animation-start" id="start-jump-circle"></div>
        </div>
    </div>
</body>
</html>
